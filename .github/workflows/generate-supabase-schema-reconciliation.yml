name: Generate Supabase Schema Reconciliation

on:
  workflow_dispatch:

jobs:
  generate-reconciliation:
    name: Generate reconciliation SQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Confirm Docker availability
        run: |
          docker --version
          docker info

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Link Supabase project for read-only diff
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          npx supabase link \
            --project-ref bbcxqvgdsdntwojjpwoz \
            --password "$SUPABASE_DB_PASSWORD"

      - name: Generate schema reconciliation SQL
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          npx supabase db diff \
            --linked \
            --schema public,extensions \
            -f production_schema_reconciliation

      - name: Stage reconciliation artifact
        run: |
          mkdir -p artifacts
          if [ -f supabase/migrations/*_production_schema_reconciliation.sql ]; then
            cp supabase/migrations/*_production_schema_reconciliation.sql artifacts/production_schema_reconciliation.sql
          elif [ -f supabase/production_schema_reconciliation.sql ]; then
            cp supabase/production_schema_reconciliation.sql artifacts/production_schema_reconciliation.sql
          elif [ -f production_schema_reconciliation.sql ]; then
            cp production_schema_reconciliation.sql artifacts/production_schema_reconciliation.sql
          else
            echo "Reconciliation SQL was not generated" >&2
            exit 1
          fi

      - name: Upload reconciliation SQL
        uses: actions/upload-artifact@v4
        with:
          name: production-schema-reconciliation-sql
          path: artifacts/production_schema_reconciliation.sql
          if-no-files-found: error
